name: echo
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  google_generative_ai: ^0.4.7
  provider: ^6.0.0
  http: ^1.1.0
  firebase_core: ^4.7.0
  cloud_firestore: ^6.3.0
  firebase_storage: ^13.3.0
  firebase_messaging: ^16.2.0
  firebase_auth: ^6.4.0
  audioplayers: ^6.6.0
  flutter_dotenv: ^6.0.0
  intl: ^0.20.2
  app_links: ^7.0.0
  share_plus: ^13.1.0
  google_fonts: ^8.1.0
  record: ^6.2.0
  path_provider: ^2.1.2
  permission_handler: ^12.0.1
  speech_to_text: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/
    - assets/fonts/
    - assets/icon/
    - assets/onboarding/
    - assets/splash/
    - .env
  
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700