name: echo
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^8.0.2
  firebase_core: ^4.7.0
  provider: ^6.1.5+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.0
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon/ic_launcher.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/ic_launcher.png"

flutter_native_splash:
  # Platform enable/disable
  android: true
  ios: true
  web: true

  # Common settings
  color: "#F8FAFC"  # Soft background matching Echo's gentle palette
  image: assets/splash/splash.png

  # Dark mode support
  color_dark: "#1A2A25"
  image_dark: assets/splash/splash.png

  # Android 12+ specific (required for newer Android versions)
  android_12:
    color: "#F8FAFC"
    image: assets/splash/splash.png
    color_dark: "#1A2A25"
    image_dark: assets/splash/splash.png

  # Web specific
  web_image_mode: center  # Options: center, contain, cover, stretch